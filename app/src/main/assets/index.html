<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 1rem; max-width: 28rem; margin: 0 auto; }
        h1 { font-size: 1.25rem; }
        button {
            display: block; width: 100%; margin: 0.5rem 0; padding: 0.75rem;
            font-size: 1rem; border-radius: 8px; border: 1px solid #333; background: #f4f4f4;
        }
        button:active { background: #ddd; }
    </style>
</head>
<body>
    <h1>Hybrid WebView</h1>
    <p>Calls are routed through <code>NexusAndroid</code>.</p>
    <button type="button" id="toast">Toast</button>
    <button type="button" id="notify">Notification</button>
    <button type="button" id="overlayStart">Start overlay</button>
    <button type="button" id="overlayStop">Stop overlay</button>
    <script>
        function callBridge(method, args) {
            try {
                if (typeof NexusAndroid === 'undefined') return;
                NexusAndroid[method].apply(NexusAndroid, args);
            } catch (e) {
                console.error(e);
            }
        }
        document.getElementById('toast').onclick = function () {
            callBridge('showToast', ['Hello from JavaScript']);
        };
        document.getElementById('notify').onclick = function () {
            callBridge('showNotification', ['Nexus', 'Message from the WebView bridge']);
        };
        document.getElementById('overlayStart').onclick = function () {
            callBridge('startOverlay', []);
        };
        document.getElementById('overlayStop').onclick = function () {
            callBridge('stopOverlay', []);
        };
    </script>
</body>
</html>
